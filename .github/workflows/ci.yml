name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build and test Docker image
        run: docker build --target test --tag vaultsh:test .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime Docker image
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_SHA}" \
            --tag "ghcr.io/mateorc/vaultsh:${GITHUB_SHA}" \
            .

      - name: Publish immutable runtime image
        if: github.event_name == 'push'
        run: docker push "ghcr.io/mateorc/vaultsh:${GITHUB_SHA}"
