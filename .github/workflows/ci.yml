name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build and test Docker image
        run: docker build --target test --tag vaultsh:test .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime Docker image
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_SHA}" \
            --tag "ghcr.io/mateorc/vaultsh:${GITHUB_SHA}" \
            .

      - name: Publish immutable runtime image
        if: github.event_name == 'push'
        run: |
          image="ghcr.io/mateorc/vaultsh:${GITHUB_SHA}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "Immutable image already exists: $image"
            exit 0
          fi
          docker push "$image"

      - name: Trigger Backend Lab assessment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          LAB_DISPATCH_TOKEN: ${{ secrets.LAB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$LAB_DISPATCH_TOKEN" ]; then
            echo "LAB_DISPATCH_TOKEN is not configured; skipping dispatch"
            exit 0
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $LAB_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mateoRc/lab/dispatches \
            -d "{\"event_type\":\"service-ci-completed\",\"client_payload\":{\"repository\":\"vaultsh\",\"sha\":\"$GITHUB_SHA\",\"run_id\":\"$GITHUB_RUN_ID\",\"conclusion\":\"success\"}}"
