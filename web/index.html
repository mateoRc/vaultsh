<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Explore Mateo Mahmutović's backend engineering portfolio through Vaultsh, the Atlas search engine, and Forge analytics.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Vaultsh | Backend engineering portfolio">
  <meta property="og:description" content="Explore a backend engineering portfolio through a read-only virtual shell, search service, and telemetry dashboard.">
  <meta property="og:image" content="https://mateolabs.dev/vault/social-preview.png">
  <meta property="og:image:width" content="1728">
  <meta property="og:image:height" content="910">
  <meta property="og:image:alt" content="Vaultsh backend engineering portfolio">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vaultsh | Backend engineering portfolio">
  <meta name="twitter:description" content="Explore a backend engineering portfolio through Vaultsh, Atlas, and Forge.">
  <meta name="twitter:image" content="https://mateolabs.dev/vault/social-preview.png">
  <link rel="canonical" href="https://mateolabs.dev/vault/">
  <link rel="icon" href="/vault/favicon.svg" type="image/svg+xml">
  <title>Vaultsh</title>
  <link rel="stylesheet" href="style.css?v=20260716">
</head>
<body>
  <main class="page">
    <header class="intro">
      <h1><span class="product-name">Vault</span><span class="shell-suffix">sh</span></h1>
    </header>

    <div class="engine-note">
      <nav class="profile-links" aria-label="Profile links">
        <a class="contact-action" href="mailto:mahmutovic.mateo@gmail.com">
          Contact ↗
        </a>
        <a href="https://github.com/mateoRc/vaultsh" target="_blank" rel="noreferrer">
          GitHub ↗
        </a>
        <a
          href="https://www.linkedin.com/in/mateo-mahmutovi%C4%87-a9837232b/"
          target="_blank"
          rel="noreferrer"
        >
          LinkedIn ↗
        </a>
      </nav>
    </div>

    <section class="terminal" aria-label="Interactive portfolio terminal">
      <header class="terminal-bar">
        <div class="window-controls" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="terminal-title">mateo@vault — shell</span>
        <div class="service-statuses" aria-label="Service status" aria-live="polite">
          <span id="status" class="status" data-state="checking">checking</span>
          <span id="atlas-status" class="service-status" data-state="checking">Atlas</span>
          <span id="forge-status" class="service-status" data-state="checking">Forge</span>
        </div>
      </header>

      <div class="terminal-body">
        <form id="command-form">
          <label id="prompt" for="command">mateo@vault:/$</label>
          <input
            id="command"
            name="command"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            maxlength="4096"
            aria-label="Shell command"
            placeholder="type a command..."
          >
        </form>
        <p id="request-status" class="request-status" aria-live="polite"></p>
        <div id="next-commands" class="next-commands" aria-label="Suggested command" hidden>
          <span>Suggestion:</span>
          <button type="button" data-command=""></button>
        </div>

        <div class="quick-command-drawer">
          <button
            id="quick-command-toggle"
            class="quick-command-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="quick-commands"
          >
            Commands
          </button>
          <div class="touch-actions">
            <button id="clear-command" type="button">Clear</button>
            <button id="run-command" type="submit" form="command-form">Run</button>
          </div>
          <div
            id="quick-commands"
            class="quick-commands"
            aria-label="Suggested commands"
            hidden
          >
            <button
              type="button"
              data-command="search Technology"
            >
              Technology
            </button>
            <button
              type="button"
              data-command="cat /docs/architecture/overview.md"
            >
              Architecture
            </button>
            <button type="button" data-command="tree /cv/experience">Experience</button>
            <button
              type="button"
              data-command='search Java | grep "/cv/experience/"'
            >
              Experience - Java
            </button>
            <button type="button" data-command="cat /cv/skills.md">Skills</button>
            <button type="button" data-command="search distributed systems">Search</button>
            <button type="button" data-command="welcome">Welcome</button>
            <button type="button" data-command="metrics">Analytics</button>
            <button type="button" data-command="dashboard">Dashboard</button>
            <button type="button" data-command="deployments">Deployments</button>
            <button type="button" data-command="contact">Contact</button>
          </div>
        </div>
      </div>
    </section>

    <p class="hint">Tap a suggestion or type a command · Tab completes · Ctrl+L clears</p>
  </main>
  <script src="terminal.js?v=20260717"></script>
</body>
</html>
