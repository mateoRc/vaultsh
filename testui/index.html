<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vaultsh Test UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="terminal">
    <h1>Vaultsh</h1>
    <p>Read-only virtual shell</p>
    <pre>Mateo Mahmutović
Senior Backend Engineer

Explore experience, skills and projects
through a virtual shell.

Type 'help' to begin.</pre>
    <p>Backend: <span id="status">checking</span></p>
    <pre id="output" aria-live="polite"></pre>
    <form id="command-form">
      <label for="command">vault:~$</label>
      <input id="command" name="command" autocomplete="off">
      <button type="submit">Run</button>
    </form>
  </main>
  <script src="terminal.js"></script>
</body>
</html>
